<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./src/assets/logo-sv.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sneaker Vault — Cửa hàng giày sneaker</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass {
        background: rgba(248, 249, 250, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .nav-link {
        position: relative;
      }
      .nav-link::after {
        content: "";
        position: absolute;
        width: 0;
        height: 1.5px;
        bottom: -4px;
        left: 0;
        background-color: #111111;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .nav-link:hover::after {
        width: 100%;
      }
      .floating-shadow {
        filter: drop-shadow(0 30px 40px rgba(0, 0, 0, 0.12));
      }
      .text-faded-bg {
        -webkit-text-stroke: 1.5px rgba(17, 17, 17, 0.04);
        color: transparent;
      }
      .glow-hover:hover {
        box-shadow: 0 0 25px rgba(17, 17, 17, 0.15);
      }
      .smooth-transition {
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .mask-gradient {
        mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
      }
      .perspective-1000 {
        perspective: 1000px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
