<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sneaker Vault — Cửa hàng giày sneaker</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "#F8F9FA",
              "surface-alt": "#F3F4F6",
              "on-background": "#111111",
              primary: "#111111",
              "on-primary": "#FFFFFF",
              secondary: "#5e5e5e",
              tertiary: "#ab3600",
              surface: "#FFFFFF",
              "surface-container": "#ebeef1",
              "outline-variant": "#c4c7c8",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "1.5rem",
              full: "9999px",
            },
            spacing: {
              "margin-mobile": "20px",
              "container-max": "1440px",
              gutter: "24px",
              "margin-desktop": "64px",
            },
            fontFamily: {
              display: ["Space Grotesk", "Be Vietnam Pro", "sans-serif"],
              body: ["Be Vietnam Pro", "sans-serif"],
            },
            animation: {
              "fade-in-up": "fadeInUp 0.8s ease-out forwards",
            },
            keyframes: {
              fadeInUp: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass {
        background: rgba(248, 249, 250, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .nav-link {
        position: relative;
      }
      .nav-link::after {
        content: "";
        position: absolute;
        width: 0;
        height: 1.5px;
        bottom: -4px;
        left: 0;
        background-color: #111111;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .nav-link:hover::after {
        width: 100%;
      }
      .floating-shadow {
        filter: drop-shadow(0 30px 40px rgba(0, 0, 0, 0.12));
      }
      .text-faded-bg {
        -webkit-text-stroke: 1.5px rgba(17, 17, 17, 0.04);
        color: transparent;
      }
      .glow-hover:hover {
        box-shadow: 0 0 25px rgba(17, 17, 17, 0.15);
      }
      .smooth-transition {
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .mask-gradient {
        mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
      }
      .perspective-1000 {
        perspective: 1000px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
